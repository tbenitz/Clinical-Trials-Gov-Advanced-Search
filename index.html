<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Research Portal</title>
    <style>
        :root { 
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --bg: #f8fafc; --card: #ffffff;
            --text: #1e293b; --text-light: #64748b;
            --accent: #7c3aed; --success: #059669; --new: #f59e0b;
        }

        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Settings */
        #sidebar { width: 320px; background: var(--card); border-right: 1px solid #e2e8f0; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .setting-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #f1f5f9; }
        .setting-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; color: var(--text-light); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        
        /* Main Content */
        #main { flex: 1; overflow-y: auto; padding: 30px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* Table Styles */
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 12px 15px; font-size: 0.8rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover { background: #f8fafc; cursor: pointer; }

        /* Badges & UI Elements */
        .badge { padding: 4px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .bg-new { background: #fef3c7; color: #92400e; }
        .bg-seen { background: #e2e8f0; color: #475569; }
        .bg-saved { background: #dcfce7; color: #166534; }
        .btn { padding: 10px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        /* Modal */
        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 100; justify-content: center; align-items: center; }
        #modalContent { background: white; width: 90%; max-width: 800px; max-height: 85vh; border-radius: 16px; padding: 40px; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; }
        .bookmark-btn { float: right; background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .bookmark-btn.active { background: var(--new); color: white; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h2 style="margin-top:0">Portal Settings</h2>
    
    <div class="setting-group">
        <label>Search Query</label>
        <textarea id="searchQuery" rows="3">bulbar AND (ALS OR "Amyotrophic Lateral Sclerosis")</textarea>
    </div>

    <div class="setting-group">
        <label>Study Status</label>
        <select id="filterStatus">
            <option value="RECRUITING,ACTIVE_NOT_RECRUITING">Active & Recruiting</option>
            <option value="COMPLETED,TERMINATED">Completed / Past</option>
            <option value="NOT_YET_RECRUITING">Upcoming (Not yet recruiting)</option>
            <option value="">All Statuses</option>
        </select>
    </div>

    <div class="setting-group">
        <label>Location (Country)</label>
        <input type="text" id="filterLocation" placeholder="e.g. United States">
    </div>

    <div class="setting-group">
        <label>Distance (Miles from Zip)</label>
        <div style="display:flex; gap:5px;">
            <input type="text" id="filterZip" placeholder="Zip">
            <input type="number" id="filterDistance" placeholder="50">
        </div>
    </div>

    <div class="setting-group">
        <label>Study Type</label>
        <select id="filterType">
            <option value="">All Types</option>
            <option value="INTERVENTIONAL">Interventional (Trials)</option>
            <option value="OBSERVATIONAL">Observational</option>
        </select>
    </div>

    <button class="btn btn-primary" onclick="refreshData()">Apply & Refresh</button>
    
    <div style="margin-top: auto; font-size: 0.75rem; color: var(--text-light);">
        Bookmarks: <span id="bookmarkCount">0</span> | Seen: <span id="seenCount">0</span>
        <br><button onclick="clearTracking()" style="border:none; background:none; color:red; padding:0; cursor:pointer; margin-top:10px;">Clear History</button>
    </div>
</aside>

<main id="main">
    <div class="header-actions">
        <h1>Research Feed</h1>
        <div id="statusIndicator" style="font-size: 0.85rem; color: var(--text-light);">Ready</div>
    </div>

    <div class="table-container">
        <table id="studyTable">
            <thead>
                <tr>
                    <th>Ref</th>
                    <th>Study Information</th>
                    <th>Location</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</main>

<div id="modal" onclick="closeModal()">
    <div id="modalContent" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <button id="modalBookmark" class="bookmark-btn">🔖 Bookmark</button>
        <div id="modalBody"></div>
    </div>
</div>

<script>
const API_BASE = "https://clinicaltrials.gov/api/v2/studies";
const STORAGE_KEY = "portal_prefs_v1";

let state = {
    seen: [],
    bookmarks: [],
    settings: {
        query: 'bulbar AND (ALS OR "Amyotrophic Lateral Sclerosis")',
        status: 'RECRUITING,ACTIVE_NOT_RECRUITING',
        location: '',
        zip: '',
        distance: '',
        type: ''
    }
};

// Initialization
function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        state = { ...state, ...JSON.parse(saved) };
        // Sync UI
        document.getElementById('searchQuery').value = state.settings.query;
        document.getElementById('filterStatus').value = state.settings.status;
        document.getElementById('filterLocation').value = state.settings.location;
        document.getElementById('filterZip').value = state.settings.zip;
        document.getElementById('filterDistance').value = state.settings.distance;
        document.getElementById('filterType').value = state.settings.type;
    }
    updateStats();
    refreshData();
}

function saveState() {
    state.settings = {
        query: document.getElementById('searchQuery').value,
        status: document.getElementById('filterStatus').value,
        location: document.getElementById('filterLocation').value,
        zip: document.getElementById('filterZip').value,
        distance: document.getElementById('filterDistance').value,
        type: document.getElementById('filterType').value
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

async function refreshData() {
    saveState();
    const statusEl = document.getElementById('statusIndicator');
    statusEl.innerText = "Searching ClinicalTrials.gov...";
    
    let url = `${API_BASE}?query.term=${encodeURIComponent(state.settings.query)}&pageSize=50`;
    
    if (state.settings.status) url += `&filter.overallStatus=${state.settings.status}`;
    if (state.settings.type) url += `&filter.studyType=${state.settings.type}`;
    if (state.settings.location) url += `&query.locn=${encodeURIComponent(state.settings.location)}`;
    if (state.settings.zip && state.settings.distance) {
        url += `&filter.geo=distance(${state.settings.zip},${state.settings.distance}mi)`;
    }

    try {
        const res = await fetch(url);
        const data = await res.json();
        renderTable(data.studies || []);
        statusEl.innerText = `Found ${data.studies?.length || 0} studies • Updated ${new Date().toLocaleTimeString()}`;
    } catch (e) {
        statusEl.innerText = "Connection Error";
    }
}

function renderTable(studies) {
    const tbody = document.querySelector("#studyTable tbody");
    tbody.innerHTML = "";

    studies.forEach(s => {
        const p = s.protocolSection;
        const id = p.identificationModule.nctId;
        const isNew = !state.seen.includes(id);
        const isBookmarked = state.bookmarks.includes(id);
        
        const row = document.createElement("tr");
        row.onclick = () => showDetails(s);

        row.innerHTML = `
            <td>
                <div style="font-weight:700">${id}</div>
                ${isBookmarked ? '<span class="badge bg-saved">SAVED</span>' : (isNew ? '<span class="badge bg-new">NEW</span>' : '<span class="badge bg-seen">SEEN</span>')}
            </td>
            <td>
                <div style="font-weight:600; color:var(--primary)">${p.identificationModule.briefTitle}</div>
                <div style="font-size:0.8rem; color:var(--text-light); margin-top:4px;">${p.identificationModule.officialTitle || ''}</div>
            </td>
            <td style="font-size:0.8rem">${p.contactsLocationsModule?.locations?.[0]?.country || 'Global'}</td>
            <td><span class="badge bg-seen" style="background:#f1f5f9">${p.statusModule.overallStatus}</span></td>
        `;
        tbody.appendChild(row);
    });
}

function showDetails(study) {
    const p = study.protocolSection;
    const id = p.identificationModule.nctId;
    const body = document.getElementById("modalBody");
    const bkmkBtn = document.getElementById("modalBookmark");

    // Mark as seen
    if (!state.seen.includes(id)) {
        state.seen.push(id);
        saveState();
        updateStats();
    }

    // Bookmark Toggle Logic
    bkmkBtn.className = state.bookmarks.includes(id) ? "bookmark-btn active" : "bookmark-btn";
    bkmkBtn.onclick = () => {
        if (state.bookmarks.includes(id)) {
            state.bookmarks = state.bookmarks.filter(b => b !== id);
            bkmkBtn.className = "bookmark-btn";
        } else {
            state.bookmarks.push(id);
            bkmkBtn.className = "bookmark-btn active";
        }
        saveState();
        updateStats();
    };

    body.innerHTML = `
        <h2>${p.identificationModule.officialTitle || p.identificationModule.briefTitle}</h2>
        <p><strong>Status:</strong> ${p.statusModule.overallStatus} | <strong>NCT:</strong> ${id}</p>
        <div style="background:#f8fafc; padding:20px; border-radius:8px; margin:20px 0;">
            <h3>Brief Summary</h3>
            <p>${p.descriptionModule?.briefSummary || "No summary available."}</p>
        </div>
        <h3>Eligibility</h3>
        <pre style="white-space:pre-wrap; font-family:inherit; background:#fff; border:1px solid #e2e8f0; padding:15px; border-radius:8px;">${p.eligibilityModule?.eligibilityCriteria || "Refer to study page."}</pre>
        <a href="https://clinicaltrials.gov/study/${id}" target="_blank" class="btn btn-primary" style="display:inline-block; width:auto; margin-top:20px; text-decoration:none;">View Full Official Study Data ↗</a>
    `;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() { document.getElementById("modal").style.display = "none"; }

function updateStats() {
    document.getElementById('bookmarkCount').innerText = state.bookmarks.length;
    document.getElementById('seenCount').innerText = state.seen.length;
}

function clearTracking() {
    if(confirm("Clear all bookmarks and 'seen' history?")) {
        state.seen = [];
        state.bookmarks = [];
        saveState();
        updateStats();
        refreshData();
    }
}

init();
</script>

</body>
</html>
