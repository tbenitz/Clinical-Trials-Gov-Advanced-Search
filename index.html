<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Research Portal v2.1</title>
    <style>
        :root { 
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --bg: #f8fafc; --card: #ffffff;
            --text: #1e293b; --text-light: #64748b;
            --accent: #7c3aed; --success: #059669; --new: #f59e0b;
        }

        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Settings */
        #sidebar { width: 320px; background: var(--card); border-right: 1px solid #e2e8f0; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .setting-group { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #f1f5f9; }
        .setting-group label { display: block; font-weight: 600; font-size: 0.75rem; margin-bottom: 8px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 0.9rem; transition: border 0.2s; }
        input:focus { border-color: var(--primary); outline: none; }
        
        /* Main Content */
        #main { flex: 1; overflow-y: auto; padding: 30px; position: relative; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* Table Styles */
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 12px 15px; font-size: 0.75rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover { background: #f1f5f9; cursor: pointer; }

        /* Badges */
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; display: inline-block; }
        .bg-new { background: #fef3c7; color: #92400e; }
        .bg-seen { background: #f1f5f9; color: #64748b; }
        .bg-saved { background: #dcfce7; color: #166534; border: 1px solid #166534; }
        
        .btn { padding: 12px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        /* Modal */
        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); z-index: 100; justify-content: center; align-items: center; }
        #modalContent { background: white; width: 90%; max-width: 850px; max-height: 85vh; border-radius: 20px; padding: 40px; overflow-y: auto; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: #cbd5e1; }
        .close-btn:hover { color: var(--text); }
        .bookmark-btn { float: right; background: #f1f5f9; border: 1px solid #e2e8f0; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .bookmark-btn.active { background: #fef3c7; color: #92400e; border-color: #f59e0b; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h2 style="margin-top:0; font-size: 1.25rem;">Portal Settings</h2>
    
    <div class="setting-group">
        <label>Search Terms</label>
        <textarea id="searchQuery" rows="3">bulbar AND (ALS OR "Amyotrophic Lateral Sclerosis")</textarea>
    </div>

    <div class="setting-group">
        <label>Recruitment Status</label>
        <select id="filterStatus">
            <option value="RECRUITING,ACTIVE_NOT_RECRUITING">Recruiting & Active</option>
            <option value="COMPLETED,TERMINATED">Past Studies (Results)</option>
            <option value="NOT_YET_RECRUITING">Upcoming</option>
            <option value="">All Statuses</option>
        </select>
    </div>

    <div class="setting-group">
        <label>Study Type</label>
        <select id="filterType">
            <option value="">All Types</option>
            <option value="INTERVENTIONAL">Interventional (Clinical Trials)</option>
            <option value="OBSERVATIONAL">Observational Studies</option>
        </select>
    </div>

    <div class="setting-group">
        <label>Location (Country)</label>
        <input type="text" id="filterLocation" placeholder="e.g. United States">
    </div>

    <div class="setting-group">
        <label>Distance (Miles from Zip)</label>
        <div style="display:flex; gap:8px;">
            <input type="text" id="filterZip" placeholder="Zip">
            <input type="number" id="filterDistance" placeholder="50">
        </div>
    </div>

    <div class="setting-group" style="background: #f1f5f9; padding: 10px; border-radius: 8px; border: none;">
        <label style="color: var(--primary); display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="showBookmarksOnly" onchange="refreshData()" style="width:auto"> 
            Show Bookmarks Only
        </label>
    </div>

    <button class="btn btn-primary" onclick="refreshData()">Update Results</button>
    
    <div style="margin-top: auto; font-size: 0.75rem; color: var(--text-light); padding-top: 15px; border-top: 1px solid #eee;">
        <b>Saved:</b> <span id="bookmarkCount">0</span> | <b>Seen:</b> <span id="seenCount">0</span>
        <br><button onclick="clearTracking()" style="border:none; background:none; color:#ef4444; padding:0; cursor:pointer; margin-top:10px; font-weight:600;">Reset All Data</button>
    </div>
</aside>

<main id="main">
    <div class="header-actions">
        <h1 style="font-size: 1.5rem;">Study Explorer</h1>
        <div id="statusIndicator" style="font-size: 0.8rem; font-weight:600; padding: 6px 12px; background: #e2e8f0; border-radius: 6px;">Initializing...</div>
    </div>

    <div class="table-container">
        <table id="studyTable">
            <thead>
                <tr>
                    <th style="width: 120px;">Reference</th>
                    <th>Study Details</th>
                    <th>Location</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="4" style="text-align:center; padding: 50px; color: var(--text-light);">Click 'Update Results' to begin.</td></tr>
            </tbody>
        </table>
    </div>
</main>

<div id="modal" onclick="closeModal()">
    <div id="modalContent" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <button id="modalBookmark" class="bookmark-btn">🔖 Save Study</button>
        <div id="modalBody"></div>
    </div>
</div>

<script>
const API_BASE = "https://clinicaltrials.gov/api/v2/studies";
const STORAGE_KEY = "als_portal_data_v3";

let state = {
    seen: [],
    bookmarks: [],
    settings: {
        query: 'bulbar AND (ALS OR "Amyotrophic Lateral Sclerosis")',
        status: 'RECRUITING,ACTIVE_NOT_RECRUITING',
        location: '',
        zip: '',
        distance: '',
        type: ''
    }
};

function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        const parsed = JSON.parse(saved);
        state.seen = parsed.seen || [];
        state.bookmarks = parsed.bookmarks || [];
        state.settings = { ...state.settings, ...parsed.settings };
        
        // Populate UI from state
        document.getElementById('searchQuery').value = state.settings.query;
        document.getElementById('filterStatus').value = state.settings.status;
        document.getElementById('filterLocation').value = state.settings.location;
        document.getElementById('filterZip').value = state.settings.zip;
        document.getElementById('filterDistance').value = state.settings.distance;
        document.getElementById('filterType').value = state.settings.type;
    }
    updateStats();
    refreshData();
}

function saveState() {
    state.settings = {
        query: document.getElementById('searchQuery').value,
        status: document.getElementById('filterStatus').value,
        location: document.getElementById('filterLocation').value,
        zip: document.getElementById('filterZip').value,
        distance: document.getElementById('filterDistance').value,
        type: document.getElementById('filterType').value
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

async function refreshData() {
    saveState();
    const statusEl = document.getElementById('statusIndicator');
    const isBookmarksOnly = document.getElementById('showBookmarksOnly').checked;
    
    statusEl.innerText = "Connecting...";
    statusEl.style.color = "inherit";

    // 1. CONSTRUCT QUERY TERM (Embedding Type here fixes the 400 error)
    let fullQuery = state.settings.query;
    if (state.settings.type) {
        fullQuery += ` AND AREA[StudyType]${state.settings.type}`;
    }

    // 2. BUILD URL
    let url = `${API_BASE}?query.term=${encodeURIComponent(fullQuery)}&pageSize=100`;
    
    if (state.settings.status) url += `&filter.overallStatus=${state.settings.status}`;
    if (state.settings.location) url += `&query.locn=${encodeURIComponent(state.settings.location)}`;
    if (state.settings.zip && state.settings.distance) {
        url += `&filter.geo=distance(${state.settings.zip},${state.settings.distance}mi)`;
    }

    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`API Error: ${response.status}`);
        
        const data = await response.json();
        let studies = data.studies || [];

        // Apply Bookmarks Only filter client-side if enabled
        if (isBookmarksOnly) {
            studies = studies.filter(s => state.bookmarks.includes(s.protocolSection.identificationModule.nctId));
        }

        renderTable(studies);
        statusEl.innerText = `Found ${studies.length} Trials`;
    } catch (e) {
        console.error(e);
        statusEl.innerText = "Search Error";
        statusEl.style.color = "red";
    }
}

function renderTable(studies) {
    const tbody = document.querySelector("#studyTable tbody");
    tbody.innerHTML = "";

    if (studies.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 60px; color: var(--text-light);">No matching studies found. Try broadening your filters.</td></tr>`;
        return;
    }

    studies.forEach(s => {
        const p = s.protocolSection;
        const id = p.identificationModule.nctId;
        const isNew = !state.seen.includes(id);
        const isSaved = state.bookmarks.includes(id);
        
        const row = document.createElement("tr");
        row.onclick = () => showDetails(s);

        row.innerHTML = `
            <td>
                <div style="font-weight:800; font-size: 0.85rem;">${id}</div>
                ${isSaved ? '<span class="badge bg-saved">SAVED</span>' : (isNew ? '<span class="badge bg-new">NEW</span>' : '<span class="badge bg-seen">SEEN</span>')}
            </td>
            <td>
                <div style="font-weight:700; color:var(--primary); line-height:1.3;">${p.identificationModule.briefTitle}</div>
                <div style="font-size:0.75rem; color:var(--text-light); margin-top:5px; font-weight:500;">${p.sponsorCollaboratorsModule.leadSponsor.name}</div>
            </td>
            <td style="font-size:0.8rem; font-weight:500;">${p.contactsLocationsModule?.locations?.[0]?.country || 'Global'}</td>
            <td><span class="badge bg-seen" style="background:#f1f5f9; border: 1px solid #e2e8f0;">${p.statusModule.overallStatus}</span></td>
        `;
        tbody.appendChild(row);
    });
}

function showDetails(study) {
    const p = study.protocolSection;
    const id = p.identificationModule.nctId;
    const bkmkBtn = document.getElementById("modalBookmark");

    if (!state.seen.includes(id)) {
        state.seen.push(id);
        saveState();
        updateStats();
    }

    bkmkBtn.className = state.bookmarks.includes(id) ? "bookmark-btn active" : "bookmark-btn";
    bkmkBtn.innerHTML = state.bookmarks.includes(id) ? "🔖 Study Saved" : "🔖 Save Study";
    
    bkmkBtn.onclick = () => {
        if (state.bookmarks.includes(id)) {
            state.bookmarks = state.bookmarks.filter(b => b !== id);
            bkmkBtn.className = "bookmark-btn";
            bkmkBtn.innerHTML = "🔖 Save Study";
        } else {
            state.bookmarks.push(id);
            bkmkBtn.className = "bookmark-btn active";
            bkmkBtn.innerHTML = "🔖 Study Saved";
        }
        saveState();
        updateStats();
        refreshData(); 
    };

    document.getElementById("modalBody").innerHTML = `
        <h2 style="margin-top:0; color:var(--primary); font-size: 1.5rem; line-height:1.2;">${p.identificationModule.officialTitle || p.identificationModule.briefTitle}</h2>
        <div style="display:flex; gap:10px; margin-bottom: 25px;">
             <span class="badge bg-seen" style="background:#eee">${id}</span>
             <span class="badge bg-seen" style="background:#eee">${p.statusModule.overallStatus}</span>
        </div>
        <div style="background:#f8fafc; padding:25px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:25px;">
            <h3 style="margin-top:0; font-size: 1rem;">Brief Summary</h3>
            <p style="font-size:0.95rem; line-height:1.6; color:var(--text);">${p.descriptionModule?.briefSummary || "No summary available."}</p>
        </div>
        <h3 style="font-size: 1rem;">Eligibility Criteria</h3>
        <pre style="white-space:pre-wrap; font-family:inherit; background:#fff; border:1px solid #e2e8f0; padding:20px; border-radius:12px; font-size:0.9rem; line-height:1.5;">${p.eligibilityModule?.eligibilityCriteria || "Refer to study page."}</pre>
        <div style="margin-top: 30px; display:flex; gap: 15px;">
            <a href="https://clinicaltrials.gov/study/${id}" target="_blank" class="btn btn-primary" style="text-decoration:none; text-align:center;">View Official Page ↗</a>
            <button onclick="closeModal()" class="btn" style="background:#e2e8f0; color:var(--text)">Close Window</button>
        </div>
    `;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() { document.getElementById("modal").style.display = "none"; }

function updateStats() {
    document.getElementById('bookmarkCount').innerText = state.bookmarks.length;
    document.getElementById('seenCount').innerText = state.seen.length;
}

function clearTracking() {
    if(confirm("This will permanently delete your saved bookmarks and 'seen' history. Continue?")) {
        state.seen = [];
        state.bookmarks = [];
        saveState();
        updateStats();
        refreshData();
    }
}

init();
</script>

</body>
</html>
